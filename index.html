<!doctype HTML>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0" />

  <title>Crossy Road</title>

  <!-- Estilos -->
  <link rel="stylesheet" href="sprites/style.css" />
  <link rel="stylesheet" href="sprites/app-store-interstitial.css" />

  <!-- SDK externo -->
  <script src="//game-cdn.poki.com/scripts/v2/poki-sdk.js"></script>
</head>
<body>
  <!-- Contenedor donde se renderiza el juego -->
  <div id="container"></div>

  <!-- Botones para cambiar modos -->
  <div class="worldSwitcher">
    <button class="worldSwitcher__button" data-world="original" type="button">
      <img alt="Original" src="https://a.poki-cdn.com/cdn-cgi/image/f=auto,width=176,height=88,quality=78/cr-mv/original-s-v2.png" 
           srcset="https://a.poki-cdn.com/cdn-cgi/image/f=auto,width=176,height=88,quality=78/cr-mv/original-s-v2.png 1x, https://a.poki-cdn.com/cdn-cgi/image/f=auto,width=352,height=176,quality=78/cr-mv/original-s-v2.png 2x" 
           height="88" width="176" decoding="async" />
    </button>
    <button class="worldSwitcher__button" data-world="space" type="button">
      <img alt="Space" src="https://a.poki-cdn.com/cdn-cgi/image/f=auto,width=176,height=88,quality=78/cr-mv/space-s-v2.png" 
           srcset="https://a.poki-cdn.com/cdn-cgi/image/f=auto,width=176,height=88,quality=78/cr-mv/space-s-v2.png 1x, https://a.poki-cdn.com/cdn-cgi/image/f=auto,width=352,height=176,quality=78/cr-mv/space-s-v2.png 2x" 
           height="88" width="176" decoding="async" />
    </button>
    <button class="worldSwitcher__button" data-world="dinosaur" type="button">
      <img alt="Dinosaur" src="https://a.poki-cdn.com/cdn-cgi/image/f=auto,width=176,height=88,quality=78/cr-mv/dinosaur-blue-s-v2.png" 
           srcset="https://a.poki-cdn.com/cdn-cgi/image/f=auto,width=176,height=88,quality=78/cr-mv/dinosaur-blue-s-v2.png 1x, https://a.poki-cdn.com/cdn-cgi/image/f=auto,width=352,height=176,quality=78/cr-mv/dinosaur-blue-s-v2.png 2x" 
           height="88" width="176" decoding="async" />
    </button>
  </div>

  <!-- Scripts JS -->
  <script src="scripts/asset-loader.min.js"></script>
  <script src="scripts/three.min.js"></script>
  <script src="scripts/game.min.js"></script>
  <script src="scripts/extra.min.js"></script>
  <script src="scripts/bootstrap.min.js"></script>

  <script>
    // Inicializa los botones de cambio de mundo
    window.onload = function () {
      function switchWorld(type, content){
        window.postMessage({ type, content: { worldName:content }}, '*');
      }

      document.querySelectorAll('.worldSwitcher__button').forEach(function(button) {
        button.addEventListener('click', function() {
          var world = button.getAttribute('data-world');
          if (world) {
            switchWorld('CrossyMultiverseMessage_switchWorldTo', world);
          }
        });
      });
    };
  </script>
</body>
</html>
