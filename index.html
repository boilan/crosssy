<!doctype HTML>
<html lang="en">
<head>
	<meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

	<title>Crossy Road</title>

	<link rel="stylesheet" href="style.css" />
	<link rel="stylesheet" href="app-store-interstitial.css" />
</head>
<body>
	<div class="worldSwitcher">
		<button class="worldSwitcher__button" data-world="original" type="button">
			<img alt="Original" src="https://a.poki-cdn.com/cdn-cgi/image/f=auto,width=176,height=88,quality=78/cr-mv/original-s-v2.png" height="88" width="176" decoding="async">
		</button>
		<button class="worldSwitcher__button" data-world="space" type="button">
			<img alt="Space" src="https://a.poki-cdn.com/cdn-cgi/image/f=auto,width=176,height=88,quality=78/cr-mv/space-s-v2.png" height="88" width="176" decoding="async">
		</button>
		<button class="worldSwitcher__button" data-world="dinosaur" type="button">
			<img alt="Dinosaur" src="https://a.poki-cdn.com/cdn-cgi/image/f=auto,width=176,height=88,quality=78/cr-mv/dinosaur-blue-s-v2.png" height="88" width="176" decoding="async">
		</button>
	</div>

	<!-- Scripts en orden correcto -->
	<script src="scripts/three.min.js"></script>
	<script src="scripts/asset-loader.min.js"></script>
	<script src="scripts/game.min.js"></script>
	<script src="scripts/extra.min.js"></script>
	<script src="scripts/bootstrap.min.js"></script>

	<script>
		window.onload = function () {
			function switchWorld(type, content){
				window.postMessage({ type, content: { worldName:content }}, '*');
			}

			document.querySelectorAll('.worldSwitcher__button').forEach(function(button) {
				button.addEventListener('click', function() {
					var world = button.getAttribute('data-world');
					if (world) {
						switchWorld('CrossyMultiverseMessage_switchWorldTo', world);
					}
				});
			});
		};
	</script>
</body>
</html>
