<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Crossy Test</title>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: black;
    }
    #container {
      width: 100vw;
      height: 100vh;
    }
  </style>

  <!-- Mock de Poki -->
  <script>
    window.PokiSDK = {
      init: () => {
        console.log("Poki mock init");
        return Promise.resolve();
      },
      gameLoadingStart: () => console.log("loading start"),
      gameLoadingFinished: () => console.log("loading finished"),
      gameplayStart: () => console.log("gameplay start"),
      gameplayStop: () => console.log("gameplay stop")
    };
  </script>
</head>

<body>
  <div id="container"></div>

  <!-- Scripts -->
  <script src="scripts/three.min.js"></script>
  <script src="scripts/asset-loader.min.js"></script>
  <script src="scripts/game.min.js"></script>
  <script src="scripts/extra.min.js"></script>
  <script src="scripts/bootstrap.min.js"></script>

  <!-- Forzar ejecución -->
  <script>
    window.addEventListener("load", () => {
      console.log("Page loaded");

      setTimeout(() => {
        console.log("Buscando funciones...");

        for (let key in window) {
          try {
            if (typeof window[key] === "function") {
              if (
                key.toLowerCase().includes("start") ||
                key.toLowerCase().includes("init")
              ) {
                console.log("Intentando ejecutar:", key);
                try {
                  window[key]();
                } catch (e) {}
              }
            }
          } catch (e) {}
        }

        const canvas = document.querySelector("canvas");
        if (canvas) {
          console.log("✅ Juego iniciado");
        } else {
          console.warn("❌ No inició el juego");
        }
      }, 2000);
    });
  </script>
</body>
</html>
